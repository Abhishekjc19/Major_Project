version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnibus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnibus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnibus-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: omnibus-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@omnibus.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - omnibus-network

volumes:
  postgres_data:
    driver: local

networks:
  omnibus-network:
    driver: bridge
